<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>語音轉文字 · Whisper 本地版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root {
--bg: #0a0e1a; --bg2: #111827; --card: #1a2332; --border: #2a3a50; --border2: #3a4a60;
--fg: #e8edf5; --fg2: #b0c0d8; --muted: #6a7a90;
--accent: #00d4aa; --accent2: #00f0c0; --accent-dim: rgba(0,212,170,.08);
--warn: #f5a623; --error: #ff5c5c; --shadow: 0 8px 40px rgba(0,0,0,.5);
}
[data-theme="light"] {
--bg: #f5f0ea; --bg2: #eae3da; --card: #ffffff; --border: #d4ccc2; --border2: #c4bab0;
--fg: #2a221c; --fg2: #5a4e42; --muted: #9a8e80;
--accent: #0d9b6a; --accent2: #0bb87e; --accent-dim: rgba(13,155,106,.08);
--warn: #d4902a; --error: #d94040; --shadow: 0 8px 40px rgba(0,0,0,.08);
}
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
font-family: 'Noto Sans TC', sans-serif;
background: var(--bg); color: var(--fg); min-height: 100vh; overflow-x: hidden;
}
.container { max-width: 700px; margin: 0 auto; padding: 16px; }
/* Header */
.header { text-align: center; padding: 24px 0 20px; }
.header-icon {
width: 56px; height: 56px; margin: 0 auto 12px;
background: linear-gradient(135deg, var(--accent), #0088cc);
border-radius: 16px; display: flex; align-items: center; justify-content: center;
font-size: 24px; color: #0a0e1a; box-shadow: 0 4px 24px var(--accent-dim);
}
.header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700; }
.header p { font-size: 13px; color: var(--muted); margin-top: 4px; }
/* Upload Card */
.upload-card {
background: var(--card); border: 1px solid var(--border); border-radius: 20px;
padding: 24px; box-shadow: var(--shadow);
}
.upload-zone {
border: 2px dashed var(--border); border-radius: 16px; padding: 48px 24px;
text-align: center; cursor: pointer; transition: all .3s; position: relative;
}
.upload-zone:hover { border-color: var(--accent); background: var(--accent-dim); }
.upload-zone.has-file { border-style: solid; border-color: var(--accent); padding: 16px; }
.upload-zone i { font-size: 40px; color: var(--accent); margin-bottom: 10px; opacity: .6; }
.upload-zone .main-text { font-size: 15px; color: var(--fg2); }
.upload-zone .sub-text { font-size: 12px; color: var(--muted); margin-top: 6px; }
.file-info { display: none; align-items: center; gap: 12px; }
.file-info.visible { display: flex; }
.file-icon { width: 40px; height: 40px; border-radius: 10px; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
.file-name { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
.file-size { font-size: 11px; color: var(--muted); }
.file-remove { width: 32px; height: 32px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .3s; flex-shrink: 0; }
.file-remove:hover { border-color: var(--error); color: var(--error); }
.lang-row { display: flex; gap: 10px; margin: 16px 0; }
.lang-btn {
flex: 1; padding: 10px; border-radius: 10px; border: 1px solid var(--border);
background: transparent; color: var(--fg2); font-size: 14px; font-weight: 500;
cursor: pointer; transition: all .3s; text-align: center; font-family: inherit;
}
.lang-btn:hover { border-color: var(--accent); color: var(--accent); }
.lang-btn.active { border-color: var(--accent); background: var(--accent-dim); color: var(--accent); }
.transcribe-btn {
width: 100%; padding: 16px; border-radius: 14px; border: none;
background: linear-gradient(135deg, var(--accent), #00b894); color: #0a0e1a;
font-size: 16px; font-weight: 700; cursor: pointer; transition: all .3s;
display: flex; align-items: center; justify-content: center; gap: 8px;
font-family: inherit; box-shadow: 0 4px 20px var(--accent-dim);
}
.transcribe-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,212,170,.3); }
.transcribe-btn:disabled { opacity: .5; cursor: not-allowed; transform: none; }
/* Progress */
.progress-section { display: none; margin-top: 20px; }
.progress-section.visible { display: block; }
.progress-bar-bg { height: 6px; border-radius: 3px; background: var(--border); overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--accent), #0088cc); width: 0%; transition: width .3s; }
.progress-status { font-size: 12px; color: var(--muted); margin-top: 8px; text-align: center; }
.progress-sub { font-size: 11px; color: var(--muted); margin-top: 4px; text-align: center; opacity: .7; }
/* Result */
.result-section { display: none; margin-top: 20px; animation: slideUp .4s ease; }
.result-section.visible { display: block; }
@keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
.result-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.result-title { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--accent); }
.result-actions { display: flex; gap: 6px; }
.action-btn {
padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border);
background: transparent; color: var(--fg2); font-size: 12px; font-weight: 500;
cursor: pointer; transition: all .3s; display: flex; align-items: center; gap: 5px; font-family: inherit;
}
.action-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
.text-output {
width: 100%; min-height: 200px; padding: 16px;
background: var(--bg2); border: 1px solid var(--border); border-radius: 12px;
color: var(--fg); font-family: 'Noto Sans TC', sans-serif; font-size: 15px;
line-height: 1.8; resize: vertical; outline: none; transition: all .3s;
}
.text-output:focus { border-color: var(--accent); }
/* History */
.history-section { margin-top: 28px; }
.history-title { font-size: 14px; font-weight: 600; color: var(--fg2); margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
.history-item {
padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border);
background: var(--card); font-size: 13px; color: var(--fg2); margin-bottom: 8px;
cursor: pointer; transition: all .3s; display: flex; gap: 8px; align-items: flex-start;
}
.history-item:hover { border-color: var(--accent); }
.history-item .hi-icon { color: var(--accent); flex-shrink: 0; margin-top: 1px; }
.history-item .hi-text { flex: 1; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.history-item .hi-time { font-size: 10px; color: var(--muted); flex-shrink: 0; }
.empty-state { text-align: center; padding: 24px; color: var(--muted); font-size: 13px; }
/* Toast */
.toast {
position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
background: var(--card); border: 1px solid var(--border); border-radius: 12px;
padding: 10px 20px; display: flex; align-items: center; gap: 8px;
font-size: 13px; color: var(--fg); box-shadow: var(--shadow); z-index: 200;
transition: transform .4s cubic-bezier(.4,0,.2,1); pointer-events: none; max-width: 90%;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast i { color: var(--accent); }
/* Mobile */
@media (max-width: 600px) {
.header { padding: 16px 0; }
.header-icon { width: 48px; height: 48px; font-size: 20px; }
.header h1 { font-size: 18px; }
.upload-card { padding: 16px; }
.upload-zone { padding: 32px 16px; }
.upload-zone i { font-size: 32px; }
.lang-row { flex-wrap: wrap; }
.lang-btn { flex: 1 1 calc(33% - 8px); font-size: 13px; padding: 8px; }
.text-output { min-height: 150px; font-size: 14px; }
}
</style>
</head>
<body>
<div class="container">
<div style="display:flex;align-items:center;gap:12px;padding:20px 0 12px">
<div class="header-icon" style="margin:0"><i class="fas fa-microphone-alt"></i></div>
<div style="flex:1">
<div style="font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700">語音轉文字</div>
<div style="font-size:13px;color:var(--muted);margin-top:2px">影片語音 → 本地 AI 即時轉文字</div>
</div>
<button class="theme-btn" id="themeBtn" onclick="toggleTheme()"><i class="fas fa-sun" id="themeIcon"></i></button>
</div>
<div class="upload-card">
<div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
<i class="fas fa-cloud-arrow-up"></i>
<p class="main-text" id="uploadMainText">點擊選擇影片或音檔</p>
<p class="sub-text">支援 MP4, MOV, AVI, MKV, MP3, WAV, M4A</p>
<div class="file-info" id="fileInfo">
<div class="file-icon"><i class="fas fa-video"></i></div>
<div>
<div class="file-name" id="fileName"></div>
<div class="file-size" id="fileSize"></div>
</div>
<button class="file-remove" onclick="removeFile(event)"><i class="fas fa-xmark"></i></button>
</div>
</div>
<input type="file" id="fileInput" accept="video/*,audio/*" style="display:none" onchange="handleFile(event)">
<div class="lang-row">
<button class="lang-btn active" data-lang="zh" onclick="selectLang('zh')">🇨🇳 中文</button>
<button class="lang-btn" data-lang="th" onclick="selectLang('th')">🇹🇭 ไทย</button>
</div>
<button class="transcribe-btn" id="transcribeBtn" onclick="startTranscribe()" disabled>
<i class="fas fa-wand-magic-sparkles"></i> 開始轉文字
</button>
<div class="progress-section" id="progressSection">
<div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
<p class="progress-status" id="progressStatus">準備中...</p>
<p class="progress-sub" id="progressSub">首次使用需下載 AI 模型 (~150MB)</p>
</div>
</div>
<div class="result-section" id="resultSection">
<div class="result-header">
<div class="result-title"><i class="fas fa-file-lines"></i> 轉寫結果</div>
<div class="result-actions">
<button class="action-btn" onclick="copyResult()"><i class="fas fa-copy"></i> 複製</button>
<button class="action-btn" onclick="downloadResult()"><i class="fas fa-download"></i> 下載</button>
<button class="action-btn" onclick="saveResult()"><i class="fas fa-bookmark"></i> 保存</button>
<button class="action-btn" onclick="clearResult()" style="color:var(--error);border-color:rgba(255,92,92,0.2)"><i class="fas fa-eraser"></i> 清除</button>
</div>
</div>
<textarea class="text-output" id="textOutput" placeholder="轉寫結果將顯示在這裡..." readonly></textarea>
</div>
<div class="history-section" id="historySection">
<div class="history-title"><i class="fas fa-clock-rotate-left" style="color:var(--muted)"></i> 歷史記錄
<button onclick="clearHistory()" style="margin-left:auto;font-size:11px;color:var(--muted);background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;cursor:pointer;font-family:inherit">清空記錄</button>
</div>
<div id="historyList"><div class="empty-state">尚無記錄</div></div>
</div>
</div>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="toastMsg"></span></div>

<script type="module">
// ===== 引入 Transformers.js =====
import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2/dist/transformers.min.js';

// 設定本地快取（減少重複下載）
env.allowLocalModels = false;
env.useBrowserCache = true;

// ===== 狀態 =====
let selectedFile = null;
let selectedLang = 'zh';
let transcriber = null;
let history = JSON.parse(localStorage.getItem('whisper-history') || '[]');
let resultText = '';

// ===== DOM =====
const toast = document.getElementById('toast');
const toastMsg = document.getElementById('toastMsg');

function showToast(msg, type) {
  toastMsg.textContent = msg;
  const icon = toast.querySelector('i');
  icon.className = type === 'error' ? 'fas fa-exclamation-circle' : 'fas fa-check-circle';
  icon.style.color = type === 'error' ? '#ff5c5c' : 'var(--accent)';
  toast.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ===== 檔案選擇 =====
window.handleFile = function(e) {
  const file = e.target.files[0];
  if (!file) return;
  selectedFile = file;
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('fileInfo').classList.add('visible');
  document.getElementById('uploadZone').classList.add('has-file');
  document.getElementById('uploadMainText').style.display = 'none';
  document.getElementById('transcribeBtn').disabled = false;
};

window.removeFile = function(e) {
  e.stopPropagation();
  selectedFile = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('fileInfo').classList.remove('visible');
  document.getElementById('uploadZone').classList.remove('has-file');
  document.getElementById('uploadMainText').style.display = '';
  document.getElementById('transcribeBtn').disabled = true;
};

function formatSize(bytes) {
  if (bytes < 1024) return bytes + 'B';
  if (bytes < 1048576) return (bytes / 1024).toFixed(1) + 'KB';
  return (bytes / 1048576).toFixed(1) + 'MB';
}

// ===== 語言選擇 =====
window.selectLang = function(lang) {
  selectedLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
};

// ===== 🔥 開始轉寫 =====
window.startTranscribe = async function() {
  if (!selectedFile) { showToast('請先選擇影片', 'error'); return; }
  
  const btn = document.getElementById('transcribeBtn');
  const progress = document.getElementById('progressSection');
  const fill = document.getElementById('progressFill');
  const status = document.getElementById('progressStatus');
  const sub = document.getElementById('progressSub');
  const result = document.getElementById('resultSection');
  
  btn.disabled = true;
  btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 處理中...';
  progress.classList.add('visible');
  result.classList.remove('visible');
  
  try {
    // Step 1: 提取音訊
    status.textContent = '⏳ 正在提取音訊...';
    sub.textContent = '從影片中分離聲音';
    fill.style.width = '10%';
    
    const audioData = await extractAudio(selectedFile);
    fill.style.width = '25%';
    
    // Step 2: 載入 Whisper 模型
    status.textContent = '📥 正在載入 AI 模型...';
    sub.textContent = 'Whisper tiny（~150MB，僅首次下載）';
    fill.style.width = '30%';
    
    if (!transcriber) {
      try {
        transcriber = await pipeline(
          'automatic-speech-recognition',
          'Xenova/whisper-tiny',
          { progress_callback: (p) => {
            if (p.status === 'progress') {
              const prog = 30 + (p.progress || 0) * 30;
              fill.style.width = prog + '%';
              status.textContent = `📥 下載模型... ${Math.round((p.progress || 0) * 100)}%`;
            }
          }}
        );
      } catch (e) {
        // 重試一次
        transcriber = await pipeline(
          'automatic-speech-recognition',
          'Xenova/whisper-tiny'
        );
      }
    }
    fill.style.width = '60%';
    
    // Step 3: 進行轉寫
    status.textContent = '🧠 AI 正在辨識語音...';
    sub.textContent = '這可能需要幾秒到幾分鐘，視影片長度而定';
    fill.style.width = '65%';
    
    const langMap = { zh: 'zh', th: 'th' };
    const output = await transcriber(audioData, {
      chunk_length_s: 30,
      stride_length_s: 5,
      language: langMap[selectedLang] || 'zh',
      task: 'transcribe',
      callback: (cb) => {
        if (cb?.status === 'progress') {
          const prog = 65 + (cb.progress || 0) * 30;
          fill.style.width = Math.min(prog, 95) + '%';
          status.textContent = `🧠 辨識中... ${Math.round((cb.progress || 0) * 100)}%`;
        }
      }
    });
    
    fill.style.width = '100%';
    status.textContent = '✅ 轉寫完成！';
    sub.textContent = '';
    
    resultText = output?.text || '';
    if (!resultText && output?.chunks) {
      resultText = output.chunks.map(c => c.text).join(' ');
    }
    
    if (resultText) {
      document.getElementById('textOutput').value = resultText;
      result.classList.add('visible');
      setTimeout(() => result.scrollIntoView({ behavior: 'smooth' }), 200);
      showToast('轉寫完成 ✓');
    } else {
      showToast('未辨識到語音內容', 'error');
    }
  } catch (err) {
    console.error('Transcribe error:', err);
    showToast('處理失敗：' + (err.message || err), 'error');
    status.textContent = '❌ 處理失敗';
    sub.textContent = err.message || '';
  } finally {
    btn.disabled = false;
    btn.innerHTML = '<i class="fas fa-wand-magic-sparkles"></i> 開始轉文字';
  }
};

// ===== 音訊提取（支援影片 + 音檔） =====
async function extractAudio(file) {
  const url = URL.createObjectURL(file);
  
  return new Promise((resolve, reject) => {
    // 用 <audio> 元素解碼（支援 video/audio 格式）
    const audioEl = new Audio();
    audioEl.src = url;
    audioEl.crossOrigin = 'anonymous';
    audioEl.preload = 'auto';
    
    audioEl.onloadedmetadata = () => {
      const duration = audioEl.duration;
      if (!duration || duration === Infinity) {
        reject(new Error('無法讀取音訊長度'));
        return;
      }
      
      const targetSR = 16000;
      const totalSamples = Math.ceil(duration * targetSR);
      const offlineCtx = new OfflineAudioContext(1, totalSamples, targetSR);
      const source = offlineCtx.createMediaElementSource(audioEl);
      source.connect(offlineCtx.destination);
      
      offlineCtx.startRendering().then((buffer) => {
        audioEl.pause();
        audioEl.src = '';
        URL.revokeObjectURL(url);
        resolve(buffer.getChannelData(0));
      }).catch(reject);
      
      audioEl.play().catch(reject);
    };
    
    audioEl.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('無法載入音訊'));
    };
  });
}

// ===== 複製 =====
window.copyResult = function() {
  if (!resultText) return;
  navigator.clipboard.writeText(resultText).then(() => showToast('已複製'));
};

// ===== 下載 =====
window.downloadResult = function() {
  if (!resultText) return;
  const blob = new Blob([resultText], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = '轉寫_' + new Date().toISOString().slice(0,10).replace(/-/g,'') + '.txt';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(a.href);
  showToast('已下載 TXT');
};

// ===== 保存歷史 =====
window.saveResult = function() {
  if (!resultText) { showToast('沒有內容', 'error'); return; }
  history.unshift({
    id: Date.now(),
    text: resultText.substring(0, 200),
    name: selectedFile?.name || '未知',
    lang: selectedLang,
    time: new Date().toLocaleString('zh-TW')
  });
  if (history.length > 20) history.pop();
  localStorage.setItem('whisper-history', JSON.stringify(history));
  renderHistory();
  showToast('已保存 ✓');
};

// ===== 歷史 =====
function renderHistory() {
  const el = document.getElementById('historyList');
  if (!history.length) { el.innerHTML = '<div class="empty-state">尚無記錄</div>'; return; }
  el.innerHTML = history.map(h =>
    '<div class="history-item" onclick="loadHistory('+h.id+')">' +
    '<div class="hi-icon"><i class="fas fa-file-audio"></i></div>' +
    '<div class="hi-text">' + h.text.replace(/\n/g, ' ') + '</div>' +
    '<div class="hi-time">' + h.time + '</div></div>'
  ).join('');
}
window.loadHistory = function(id) {
  const h = history.find(r => r.id === id);
  if (!h) return;
  resultText = h.text;
  document.getElementById('textOutput').value = h.text;
  document.getElementById('resultSection').classList.add('visible');
  document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth' });
};

window.clearHistory = function() {
  history = [];
  localStorage.removeItem('whisper-history');
  renderHistory();
  showToast('記錄已清空');
};

renderHistory();

window.toggleTheme = function() {
  const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
  document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
  document.getElementById('themeIcon').className = isDark ? 'fas fa-moon' : 'fas fa-sun';
  localStorage.setItem('whisper-theme', isDark ? 'light' : 'dark');
};
const savedTheme = localStorage.getItem('whisper-theme');
if (savedTheme === 'light') toggleTheme();
console.log('🎤 語音轉文字工具已準備就緒');
</script>

<noscript>
  <div style="padding:40px;text-align:center;color:#ff5c5c">
    <i class="fas fa-exclamation-triangle" style="font-size:48px;margin-bottom:16px;display:block"></i>
    <p>您的瀏覽器需要啟用 JavaScript 才能使用此工具。</p>
  </div>
</noscript>
</body>
</html>
