<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>語音轉文字 · Whisper 本地版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Noto Sans TC',sans-serif;background:#0a0e1a;color:#e8edf5;min-height:100vh}
.c{max-width:700px;margin:0 auto;padding:16px}
.t{display:flex;align-items:center;gap:10px;padding:16px 0 8px}
.ti{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#00d4aa,#0088cc);display:flex;align-items:center;justify-content:center;font-size:18px;color:#0a0e1a;flex-shrink:0}
.t1{flex:1}
.t1 h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700}
.t1 p{font-size:12px;color:#6a7a90;margin-top:1px}
.engine{display:flex;align-items:center;gap:6px;padding:8px 12px;border-radius:8px;background:rgba(0,212,170,.06);border:1px solid rgba(0,212,170,.15);margin-bottom:12px;font-size:12px;color:#b0c0d8}
.engine .dot{width:8px;height:8px;border-radius:50%;background:#f5a623;flex-shrink:0;animation:pl 1s infinite}
@keyframes pl{0%,100%{opacity:1}50%{opacity:.3}}
.engine.ok .dot{background:#00d4aa!important;animation:none!important}
.engine.err .dot{background:#ff5c5c!important;animation:none!important}
.engine.ok{color:#00d4aa}.engine.err{color:#ff5c5c}
.card{background:#1a2332;border:1px solid #2a3a50;border-radius:20px;padding:20px}
.zone{border:2px dashed #2a3a50;border-radius:16px;padding:40px 20px;text-align:center;cursor:pointer;transition:all .3s}
.zone:hover{border-color:#00d4aa;background:rgba(0,212,170,.08)}
.zone.has{border-style:solid;border-color:#00d4aa;padding:12px}
.zone i{font-size:36px;color:#00d4aa;margin-bottom:8px;opacity:.6}
.zone .a{font-size:14px;color:#b0c0d8}.zone .b{font-size:11px;color:#6a7a90;margin-top:4px}
.fi{display:none;align-items:center;gap:10px}
.fi.show{display:flex}
.fn{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.fd{width:28px;height:28px;border-radius:6px;border:1px solid #2a3a50;background:transparent;color:#6a7a90;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.fd:hover{border-color:#ff5c5c;color:#ff5c5c}
.lang{display:flex;gap:8px;margin:12px 0}
.lang button{flex:1;padding:8px;border-radius:8px;border:1px solid #2a3a50;background:transparent;color:#b0c0d8;font-size:13px;font-weight:500;cursor:pointer;transition:all .3s;font-family:inherit}
.lang button:hover{border-color:#00d4aa;color:#00d4aa}
.lang button.on{border-color:#00d4aa;background:rgba(0,212,170,.08);color:#00d4aa}
.go{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#00d4aa,#00b894);color:#0a0e1a;font-size:15px;font-weight:700;cursor:pointer;transition:all .3s;font-family:inherit}
.go:hover{transform:translateY(-2px)}
.go:disabled{opacity:.5;cursor:not-allowed;transform:none}
.st{font-size:11px;color:#6a7a90;margin-top:8px;text-align:center}
.pr{display:none;margin-top:16px}.pr.show{display:block}
.pb{height:5px;border-radius:3px;background:#2a3a50;overflow:hidden}
.pf{height:100%;border-radius:3px;background:linear-gradient(90deg,#00d4aa,#0088cc);width:0%;transition:width .3s}
.pt{font-size:12px;color:#6a7a90;margin-top:6px;text-align:center}
.ps{font-size:11px;color:#6a7a90;margin-top:3px;text-align:center;opacity:.7}
.rs{display:none;margin-top:20px;animation:up .4s ease}.rs.show{display:block}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;flex-wrap:wrap;gap:6px}
.rt{font-size:14px;font-weight:600;color:#00d4aa;display:flex;align-items:center;gap:6px}
.ra{display:flex;gap:4px}
.ab{padding:6px 10px;border-radius:6px;border:1px solid #2a3a50;background:transparent;color:#b0c0d8;font-size:11px;cursor:pointer;transition:all .3s;font-family:inherit;display:flex;align-items:center;gap:4px}
.ab:hover{border-color:#00d4aa;color:#00d4aa}
.tx{width:100%;min-height:150px;padding:14px;background:#111827;border:1px solid #2a3a50;border-radius:10px;color:#e8edf5;font-family:'Noto Sans TC',sans-serif;font-size:14px;line-height:1.7;resize:vertical;outline:none}
.tx:focus{border-color:#00d4aa}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%)translateY(100px);background:#1a2332;border:1px solid #2a3a50;border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:8px;font-size:12px;color:#e8edf5;z-index:200;transition:transform .4s;pointer-events:none;max-width:90%}
.toast.show{transform:translateX(-50%)translateY(0)}
.toast i{color:#00d4aa}
</style>
</head>
<body>
<div class="c">
<div class="t">
<div class="ti"><i class="fas fa-microphone-alt"></i></div>
<div class="t1"><h1>語音轉文字</h1><p>影片語音 -> AI 轉寫，不上傳</p></div>
</div>
<div class="engine" id="eng">
<div class="dot"></div>
<span id="et">正在載入 AI 引擎...</span>
</div>
<div class="card">
<div class="zone" id="zone" onclick="document.getElementById('fi').click()">
<i class="fas fa-cloud-arrow-up"></i>
<p class="a" id="za">選擇影片或音檔</p>
<p class="b">MP4 / MOV / MP3 / WAV / M4A</p>
<div class="fi" id="fi2">
<div class="fn" id="fn"></div>
<button class="fd" onclick="rm(event)"><i class="fas fa-xmark"></i></button>
</div>
</div>
<input type="file" id="fi" accept="video/*,audio/*" style="display:none" onchange="onF(event)">
<div class="lang">
<button class="on" data-l="zh" onclick="pk('zh')">🇨🇳 中文</button>
<button data-l="th" onclick="pk('th')">🇹🇭 ไทย</button>
</div>
<button class="go" id="go" onclick="s()" disabled>🎤 開始轉文字</button>
<p class="st">Whisper tiny 模型 (~150MB)，僅首次下載</p>
<div class="pr" id="pr">
<div class="pb"><div class="pf" id="pf"></div></div>
<p class="pt" id="pt">準備中...</p>
<p class="ps" id="ps"></p>
</div>
</div>
<div class="rs" id="rs">
<div class="rh">
<div class="rt"><i class="fas fa-file-lines"></i> 結果</div>
<div class="ra">
<button class="ab" onclick="cp()"><i class="fas fa-copy"></i> 複製</button>
<button class="ab" onclick="dl()"><i class="fas fa-download"></i> 下載</button>
</div>
</div>
<textarea class="tx" id="tx" readonly></textarea>
</div>
</div>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="tm"></span></div>

<script src="/transformers.min.js"></script>
<script>
// ===== 等待引擎載入 =====
(function(){
  const eng=document.getElementById('eng'),et=document.getElementById('et');
  function check(){
    if(window.transformers){
      eng.className='engine ok';et.textContent='✅ AI 引擎已就緒';
      if(window.F) document.getElementById('go').disabled=false;
      return;
    }
    setTimeout(check,200);
  }
  check();
})();

// ===== 工具函數 =====
function $(i){return document.getElementById(i)}
function msg(m,t){
  const e=$('toast'),ic=e.querySelector('i');
  $('tm').textContent=m;
  ic.className=t==='err'?'fas fa-exclamation-circle':'fas fa-check-circle';
  ic.style.color=t==='err'?'#ff5c5c':'#00d4aa';
  e.classList.add('show');
  clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),3000);
}
let F=null,L='zh',T=null,R='';

function onF(e){
  const f=e.target.files[0];if(!f)return;
  F=f;$('fn').textContent=f.name;$('fi2').classList.add('show');
  $('zone').classList.add('has');$('za').style.display='none';
  if(window.transformers)$('go').disabled=false;
}
function rm(e){
  e.stopPropagation();F=null;$('fi').value='';
  $('fi2').classList.remove('show');$('zone').classList.remove('has');
  $('za').style.display='';$('go').disabled=true;
}
function pk(l){L=l;document.querySelectorAll('.lang button').forEach(b=>b.classList.toggle('on',b.dataset.l===l))}

async function s(){
  if(!F){msg('請先選檔案','err');return}
  if(!window.transformers){msg('引擎未就緒','err');return}
  const go=$('go'),pr=$('pr'),pf=$('pf'),pt=$('pt'),ps=$('ps'),rs=$('rs');
  go.disabled=true;go.textContent='⏳ 處理中...';
  pr.classList.add('show');rs.classList.remove('show');
  pf.style.width='0%';

  try{
    // 1. 解碼
    pt.textContent='⏳ 解碼音訊...';ps.textContent='從檔案提取聲音';
    pf.style.width='5%';
    const buf=await F.arrayBuffer();
    const ctx=new AudioContext();
    const ab=await ctx.decodeAudioData(buf.slice(0));
    const ad=toMono16k(ab);
    ctx.close();
    pf.style.width='25%';ps.textContent='音訊解碼完成 ('+(ad.length/16000).toFixed(1)+' 秒)';

    // 2. 載入 Whisper
    pt.textContent='📥 載入 AI 模型...';ps.textContent='Whisper tiny (~150MB)';
    pf.style.width='30%';
    if(!T){
      const{pipeline,env}=window.transformers;
      env.allowLocalModels=false;env.useBrowserCache=true;
      T=await pipeline('automatic-speech-recognition','Xenova/whisper-tiny',{
        progress_callback:p=>{
          if(p?.status==='progress'){
            const w=30+(p.progress||0)*30;
            pf.style.width=Math.min(w,59)+'%';
            pt.textContent='📥 下載 '+Math.round((p.progress||0)*100)+'%';
          }
        }
      });
    }
    pf.style.width='60%';

    // 3. 辨識
    pt.textContent='🧠 辨識中...';ps.textContent='視長度而定，請稍候';
    pf.style.width='65%';
    const lm={zh:'zh',th:'th'};
    const out=await T(ad,{
      chunk_length_s:30,stride_length_s:5,
      language:lm[L]||'zh',task:'transcribe',
      callback:cb=>{
        if(cb?.status==='progress'){
          const w=65+(cb.progress||0)*30;
          pf.style.width=Math.min(w,95)+'%';
          pt.textContent='🧠 '+Math.round((cb.progress||0)*100)+'%';
        }
      }
    });
    pf.style.width='100%';pt.textContent='✅ 完成！';ps.textContent='';
    R=out?.text||'';
    if(!R&&out?.chunks)R=out.chunks.map(c=>c.text).join(' ');
    if(R){$('tx').value=R;rs.classList.add('show');setTimeout(()=>rs.scrollIntoView({behavior:'smooth'}),200);msg('完成 ✓')}
    else msg('未辨識到語音','err');
  }catch(e){
    console.error(e);pt.textContent='❌ 失敗';ps.textContent=e.message||String(e);
    msg('處理失敗','err');
  }finally{go.disabled=false;go.textContent='🎤 開始轉文字'}
}

function toMono16k(b){
  const sr=16000,ch=b.numberOfChannels,osr=b.sampleRate,ol=b.length;
  let m;
  if(ch===1)m=b.getChannelData(0);
  else{m=new Float32Array(ol);for(let i=0;i<ol;i++){let s=0;for(let c=0;c<ch;c++)s+=b.getChannelData(c)[i];m[i]=s/ch}}
  if(osr===sr)return m;
  const r=osr/sr,nl=Math.floor(m.length/r),res=new Float32Array(nl);
  for(let i=0;i<nl;i++){const s=i*r,lo=Math.floor(s),hi=Math.min(lo+1,m.length-1),f=s-lo;res[i]=m[lo]*(1-f)+m[hi]*f}
  return res;
}

function cp(){if(!R)return;navigator.clipboard.writeText(R).then(()=>msg('已複製'))}
function dl(){
  if(!R)return;
  const b=new Blob([R],{type:'text/plain;charset=utf-8'}),a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download='轉寫_'+new Date().toISOString().slice(0,10).replace(/-/g,'')+'.txt';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);msg('已下載');
}

console.log('🎤 語音轉文字 v4 已準備');
</script>
</body>
</html>
