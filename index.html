<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小肚的工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Space Grotesk',sans-serif;background:#0a0e17;color:#e8edf5;min-height:100vh}
.c{max-width:600px;margin:0 auto;padding:40px 20px}
.h{text-align:center;margin-bottom:40px}
.h h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#00e8a2,#00b4d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.h p{color:#7b8ba8;margin-top:6px;font-size:13px}
.g{display:grid;gap:14px}
.cd{background:#111927;border:1px solid #1e2d47;border-radius:16px;padding:20px;transition:all .3s;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:14px}
.cd:hover{border-color:#00e8a2;transform:translateY(-3px);box-shadow:0 10px 30px rgba(0,232,162,.08)}
.ci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.ci.g1{background:rgba(0,232,162,.1);color:#00e8a2}
.ci.g2{background:rgba(0,180,216,.1);color:#00b4d8}
.cif{flex:1}
.ct{font-size:15px;font-weight:600;color:#e2eaf5;margin-bottom:3px}
.cd2{font-size:12px;color:#7b8ba8;line-height:1.4}
.ca{color:#3a5060;font-size:13px;transition:all .3s}
.cd:hover .ca{color:#00e8a2;transform:translateX(4px)}
</style>
</head>
<body>
<div class="c">
<div class="h"><h1>🛠 小肚的工具箱</h1><p>實用工具，免安裝、免註冊</p></div>
<div class="g">
<a class="cd" href="/codeforge">
<div class="ci g1"><i class="fas fa-code"></i></div>
<div class="cif"><div class="ct">CodeForge 代碼編輯器</div><div class="cd2">HTML / CSS / JS 即時編輯與預覽，內建控制台</div></div>
<div class="ca"><i class="fas fa-arrow-right"></i></div>
</a>
<a class="cd" href="/notebook">
<div class="ci g2"><i class="fas fa-book"></i></div>
<div class="cif"><div class="ct">多功能筆記本</div><div class="cd2">分類管理、雲端同步、便利貼風格的筆記工具</div></div>
<div class="ca"><i class="fas fa-arrow-right"></i></div>
</a>
</div>
</div>
</body>
</html>
