<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小肚的工具箱</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans TC','Space Grotesk',sans-serif;background:#0a0e17;color:#e8edf5;min-height:100vh}
.container{max-width:600px;margin:0 auto;padding:40px 20px}
.header{text-align:center;margin-bottom:40px}
.header h1{font-family:'Space Grotesk',sans-serif;font-size:28px;font-weight:700;background:linear-gradient(135deg,#00e8a2,#00b4d8);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header p{color:#7b8ba8;margin-top:8px;font-size:14px}
.cards{display:grid;gap:16px}
.card{background:#111927;border:1px solid #1e2d47;border-radius:16px;padding:24px;transition:all .3s;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:16px}
.card:hover{border-color:#00e8a2;transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,232,162,.1)}
.card-icon{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.card-icon.green{background:rgba(0,232,162,.1);color:#00e8a2}
.card-icon.orange{background:rgba(245,166,35,.1);color:#f5a623}
.card-info{flex:1}
.card-title{font-size:16px;font-weight:600;color:#e2eaf5;margin-bottom:4px}
.card-desc{font-size:13px;color:#7b8ba8;line-height:1.4}
.card-arrow{color:#3a5060;font-size:14px;transition:all .3s}
.card:hover .card-arrow{color:#00e8a2;transform:translateX(4px)}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🛠 小肚的工具箱</h1>
<p>精選實用工具，全部免安裝、免註冊</p>
</div>
<div class="cards">
<a class="card" href="/codeforge">
<div class="card-icon green"><i class="fas fa-code"></i></div>
<div class="card-info">
<div class="card-title">CodeForge 代碼編輯器</div>
<div class="card-desc">HTML / CSS / JS 即時編輯與預覽，內建控制台</div>
</div>
<div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
</a>
<a class="card" href="/transcribe">
<div class="card-icon orange"><i class="fas fa-microphone-alt"></i></div>
<div class="card-info">
<div class="card-title">語音轉文字</div>
<div class="card-desc">上傳影片/音檔，瀏覽器內 AI 即時轉寫，不上傳任何資料</div>
</div>
<div class="card-arrow"><i class="fas fa-arrow-right"></i></div>
</a>
</div>
</div>
</body>
</html>
