<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🤖 DeepSeek 對話</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#0a0e17;color:#e8edf5;min-height:100vh}
.c{max-width:700px;margin:0 auto;padding:16px}
.hd{display:flex;align-items:center;gap:10px;padding:16px 0 20px}
.hd .ic{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#10b981,#059669);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.hd .t1{flex:1}
.hd .t1 h1{font-size:20px;font-weight:700}
.hd .t1 p{font-size:12px;color:#6a7a90;margin-top:1px}
.card{background:#111927;border:1px solid #1e2d47;border-radius:16px;padding:20px;margin-bottom:14px}
textarea{width:100%;padding:12px 14px;border:1.5px solid #2a3a50;border-radius:10px;background:#0c1019;color:#e8edf5;font-size:14px;font-family:inherit;line-height:1.6;resize:vertical;outline:none;min-height:120px;transition:border-color .2s}
textarea:focus{border-color:#10b981}
.btn{width:100%;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#10b981,#059669);color:#fff;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:6px}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(16,185,129,.3)}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none}
.kr{display:flex;gap:6px;align-items:center}
.kr input{flex:1;padding:8px 10px;border:1.5px solid #2a3a50;border-radius:8px;background:#0c1019;color:#e8edf5;font-size:12px;outline:none;transition:border-color .2s}
.kr input:focus{border-color:#10b981}
.kr .kb{padding:6px 12px;border-radius:6px;border:1px solid #2a3a50;background:transparent;color:#b0c0d8;font-size:11px;cursor:pointer;transition:all .3s;white-space:nowrap}
.kr .kb:hover{border-color:#10b981;color:#10b981}
.kt{font-size:10px;color:#6a7a90;margin-top:3px}
.rs{display:none}
.rs.show{display:block}
.rh{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.rh .rt{font-size:14px;font-weight:600;color:#10b981;display:flex;align-items:center;gap:6px}
.rb{background:#0c1019;border:1px solid #2a3a50;border-radius:10px;padding:14px;min-height:100px;white-space:pre-wrap;font-size:14px;line-height:1.7}
.ac{display:flex;gap:6px;margin-top:8px}
.ac button{padding:6px 12px;border-radius:6px;border:1px solid #2a3a50;background:transparent;color:#b0c0d8;font-size:11px;cursor:pointer;transition:all .3s;font-family:inherit}
.ac button:hover{border-color:#10b981;color:#10b981}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%)translateY(100px);background:#111927;border:1px solid #1e2d47;border-radius:10px;padding:10px 18px;display:flex;align-items:center;gap:8px;font-size:12px;z-index:200;transition:transform .4s;pointer-events:none;max-width:90%}
.toast.show{transform:translateX(-50%)translateY(0)}
.toast i{color:#10b981}
@media(max-width:600px){.hd .t1 h1{font-size:18px}.card{padding:16px}}
</style>
</head>
<body>
<div class="c">
<div class="hd">
<div class="ic"><i class="fas fa-robot"></i></div>
<div class="t1"><h1>DeepSeek</h1><p>直接對話</p></div>
</div>
<div class="card">
<textarea id="input" placeholder="輸入你想問的問題或指令..."></textarea>
<button class="btn" id="goBtn" onclick="ask()">🚀 送出</button>
</div>
<div class="card" style="padding:14px 18px">
<div id="keyArea">
<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
<span style="font-size:12px;color:#6a7a90">🔑 API Key</span>
</div>
<div class="kr">
<input type="password" id="apiKey" placeholder="sk-... 申請：platform.deepseek.com">
<button class="kb" onclick="saveKey()">儲存</button>
</div>
<p class="kt">存完後請把此頁加入書籤，Key 會編碼在網址中</p>
</div>
<div id="keyDone" style="display:none;align-items:center;justify-content:space-between">
<span style="font-size:13px;color:#10b981">✅ Key 已配置</span>
<button class="kb" onclick="resetKey()">更換</button>
</div>
</div>
<div class="card rs" id="rs">
<div class="rh"><div class="rt"><i class="fas fa-comment-dots"></i> DeepSeek 回應</div></div>
<div class="rb" id="rb"></div>
<div class="ac">
<button onclick="cp()">📋 複製</button>
<button onclick="clr()">🗑️ 清除</button>
</div>
</div>
</div>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i><span id="tm"></span></div>

<script>
// 🔑 Key 管理：localStorage + Cookie + URL Hash 三重儲存
function gk(){
  var k = localStorage.getItem('ds-key');
  if(k) return k;
  var m = document.cookie.match('(^|;)\\s*ds-key\\s*=\\s*([^;]+)');
  if(m) { var v = decodeURIComponent(m[2]); localStorage.setItem('ds-key',v); return v; }
  var h = window.location.hash.replace('#','');
  if(h && h.indexOf('sk-')===0) { sk(h); return h; }
  return null;
}
function sk(k){ localStorage.setItem('ds-key',k); document.cookie='ds-key='+encodeURIComponent(k)+';path=/;max-age=31536000;SameSite=Lax'; window.location.hash=k; }
function rk(){ localStorage.removeItem('ds-key'); document.cookie='ds-key=;path=/;max-age=0'; history.replaceState(null,'','/prompt-optimizer'); }

if(gk()){ document.getElementById('keyArea').style.display='none'; document.getElementById('keyDone').style.display='flex'; }

function saveKey(){
  var k = document.getElementById('apiKey').value.trim();
  if(!k) return;
  sk(k);
  document.getElementById('keyArea').style.display='none';
  document.getElementById('keyDone').style.display='flex';
  msg('✅ Key 已儲存，請加入書籤');
}
function resetKey(){
  rk();
  document.getElementById('keyArea').style.display='';
  document.getElementById('keyDone').style.display='none';
  document.getElementById('apiKey').value='';
}

function msg(m){
  var t=document.getElementById('toast');
  document.getElementById('tm').textContent=m;
  t.classList.add('show');
  clearTimeout(t._t);
  t._t=setTimeout(function(){t.classList.remove('show');},2500);
}

async function ask(){
  var text=document.getElementById('input').value.trim();
  if(!text){msg('請輸入內容');return}
  var key=gk();
  if(!key){msg('請先設定 API Key');return}
  var btn=document.getElementById('goBtn');
  var rs=document.getElementById('rs');
  var rb=document.getElementById('rb');
  btn.disabled=true;btn.textContent='⏳ DeepSeek 思考中...';
  rs.classList.remove('show');
  try{
    var resp=await fetch('https://api.deepseek.com/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'deepseek-chat',messages:[{role:'user',content:text}],stream:false})
    });
    if(!resp.ok){var e=await resp.json();throw new Error(e.error?.message||'HTTP '+resp.status);}
    var d=await resp.json();
    rb.textContent=d.choices[0].message.content;
    rs.classList.add('show');
    rs.scrollIntoView({behavior:'smooth'});
    msg('完成 ✅');
  }catch(e){rb.textContent='❌ 錯誤：'+e.message;rs.classList.add('show');msg('失敗');}
  btn.disabled=false;btn.textContent='🚀 送出';
}

function cp(){var t=document.getElementById('rb').textContent;if(!t)return;navigator.clipboard.writeText(t).then(function(){msg('已複製');});}
function clr(){document.getElementById('rb').textContent='';document.getElementById('rs').classList.remove('show');msg('已清除');}

document.getElementById('input').addEventListener('keydown',function(e){if(e.ctrlKey&&e.key==='Enter'){e.preventDefault();ask();}});
</script>
</body>
</html>
